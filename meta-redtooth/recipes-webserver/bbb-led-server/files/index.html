<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BBB LED Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 32px;
    }
    h1 { font-size: 1.8em; }
    #clock { color: #aaa; font-size: 1em; letter-spacing: 0.03em; }
    .led-buttons {
      display: flex;
      gap: 16px;
    }
    .led-btn {
      width: 90px;
      height: 90px;
      border: none;
      border-radius: 12px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      background: #d50000;
      color: #fff;
      transition: background 0.2s, transform 0.1s, opacity 0.1s;
    }
    .led-btn.on  { background: #00c853; color: #000; }
    .led-btn:active { transform: scale(0.94); }
    .led-btn:hover  { opacity: 0.85; }
  </style>
</head>
<body>
  <h1>BBB LED Control</h1>
  <p id="clock"></p>
  <div class="led-buttons" id="btns"></div>

  <script>
    var clockFmt = new Intl.DateTimeFormat('fr-CA', {
      timeZone: 'America/Montreal',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
    function updateClock() {
      document.getElementById('clock').textContent = clockFmt.format(new Date());
    }
    updateClock();
    setInterval(updateClock, 1000);

    var NUM_LEDS = 4;
    var states = [false, false, false, false];

    var container = document.getElementById('btns');
    for (var i = 0; i < NUM_LEDS; i++) {
      (function(n) {
        var btn = document.createElement('button');
        btn.className = 'led-btn';
        btn.id = 'btn' + n;
        btn.textContent = 'USR' + n;
        btn.onclick = function() { toggleLed(n); };
        container.appendChild(btn);
      })(i);
    }

    function setDisplay(n, isOn) {
      states[n] = isOn;
      var btn = document.getElementById('btn' + n);
      btn.className = 'led-btn' + (isOn ? ' on' : '');
    }

    function toggleLed(n) {
      var action = states[n] ? 'off' : 'on';
      fetch('/?led=' + n + '&action=' + action)
        .then(function(r) { return r.text(); })
        .then(function(t) { setDisplay(n, t.trim() === 'LED ON'); })
        .catch(function() {});
    }

    for (var j = 0; j < NUM_LEDS; j++) {
      (function(n) {
        fetch('/?led=' + n + '&action=status')
          .then(function(r) { return r.text(); })
          .then(function(t) { setDisplay(n, t.trim() === 'LED ON'); })
          .catch(function() {});
      })(j);
    }
  </script>
</body>
</html>
